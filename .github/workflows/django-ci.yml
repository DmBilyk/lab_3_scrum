name: Django CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ──────────────────────────────────────────────
  # 1. BUILD — встановлення залежностей
  # ──────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Клонування репозиторію
        uses: actions/checkout@v4

      - name: Встановлення Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Встановлення залежностей
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Перевірка конфігурації Django
        run: python manage.py check

  # ──────────────────────────────────────────────
  # 2. TEST — запуск тестів
  # ──────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Клонування репозиторію
        uses: actions/checkout@v4

      - name: Встановлення Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Встановлення залежностей
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Запуск тестів
        run: python manage.py test portfolio --verbosity=2
